<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:560px">
    <h2 class="mb-4">👤 Trainer Profile</h2>

    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <span th:text="${trainer.name}"></span>
                <span th:if="${trainer.trainerType == 'FULL_TIME'}" class="badge bg-primary ms-2 fs-6">Full-Time</span>
                <span th:if="${trainer.trainerType == 'PART_TIME'}" class="badge bg-info text-dark ms-2 fs-6">Part-Time</span>
            </h5>
            <div>
                <span th:if="${trainer.status == 'ACTIVE'}"
                      class="badge bg-success">ACTIVE</span>
                <span th:if="${trainer.status == 'INACTIVE'}"
                      class="badge bg-secondary">INACTIVE</span>
            </div>
        </div>
        <div class="card-body">
            <p><strong>Trainer ID:</strong>
                <span th:text="${trainer.trainerId}"></span></p>
            <p><strong>Email:</strong>
                <span th:text="${trainer.email}"></span></p>
            <p><strong>Phone:</strong>
                <span th:text="${trainer.phone}"></span></p>
            <p><strong>Specialization:</strong>
                <span th:text="${trainer.specialization}"></span></p>
            <p><strong>Availability:</strong>
                <span th:text="${trainer.availability}"></span></p>

            <hr th:if="${trainer.trainerType == 'FULL_TIME' or trainer.trainerType == 'PART_TIME'}">

            <div th:if="${trainer.trainerType == 'FULL_TIME'}">
                <p><strong>Department:</strong> <span th:text="${trainer.department}"></span></p>
                <p><strong>Contract Start:</strong> <span th:text="${trainer.contractStartDate}"></span></p>
                <p><strong>Annual Leave Days:</strong> <span th:text="${trainer.annualLeaveDays}"></span></p>
                <p><strong>Monthly Salary:</strong> Rs. <span th:text="${trainer.salary}"></span></p>
            </div>

            <div th:if="${trainer.trainerType == 'PART_TIME'}">
                <p><strong>Hours Per Week:</strong> <span th:text="${trainer.hoursPerWeek}"></span></p>
                <p><strong>Hourly Rate:</strong> Rs. <span th:text="${trainer.hourlyRate}"></span> / hr</p>
            </div>

            <div th:if="${trainer.trainerType != 'FULL_TIME' and trainer.trainerType != 'PART_TIME'}">
                <p><strong>Monthly Salary:</strong> Rs. <span th:text="${trainer.salary}"></span></p>
            </div>
        </div>
        <div class="card-footer d-flex gap-2">
            <a th:href="@{/trainer/edit/{id}(id=${trainer.trainerId})}"
               class="btn btn-primary">Edit</a>
            <form th:action="@{/trainer/deactivate/{id}(id=${trainer.trainerId})}"
                  method="post">
                <button class="btn btn-warning"
                        onclick="return confirm('Deactivate this trainer?')">
                    Deactivate
                </button>
            </form>
            <a th:href="@{/trainer/list}"
               class="btn btn-outline-secondary">Back to List</a>
        </div>
    </div>
</div>
</body>
</html>
