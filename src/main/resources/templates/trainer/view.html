<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:560px">
    <h2 class="mb-4">👤 Trainer Profile</h2>

    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0" th:text="${trainer.name}"></h5>
            <span th:if="${trainer.status == 'ACTIVE'}"
                  class="badge bg-success">ACTIVE</span>
            <span th:if="${trainer.status == 'INACTIVE'}"
                  class="badge bg-secondary">INACTIVE</span>
        </div>
        <div class="card-body">
            <p><strong>Trainer ID:</strong>
                <span th:text="${trainer.trainerId}"></span></p>
            <p><strong>Email:</strong>
                <span th:text="${trainer.email}"></span></p>
            <p><strong>Phone:</strong>
                <span th:text="${trainer.phone}"></span></p>
            <p><strong>Specialization:</strong>
                <span th:text="${trainer.specialization}"></span></p>
            <p><strong>Availability:</strong>
                <span th:text="${trainer.availability}"></span></p>
            <p><strong>Monthly Salary:</strong>
                Rs. <span th:text="${trainer.salary}"></span></p>
        </div>
        <div class="card-footer d-flex gap-2">
            <a th:href="@{/trainer/edit/{id}(id=${trainer.trainerId})}"
               class="btn btn-primary">Edit</a>
            <form th:action="@{/trainer/deactivate/{id}(id=${trainer.trainerId})}"
                  method="post">
                <button class="btn btn-warning"
                        onclick="return confirm('Deactivate this trainer?')">
                    Deactivate
                </button>
            </form>
            <a th:href="@{/trainer/list}"
               class="btn btn-outline-secondary">Back to List</a>
        </div>
    </div>
</div>
</body>
</html>
