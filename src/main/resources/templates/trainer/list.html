<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Trainers - Fitness Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>🏋️ Trainer Management</h2>
        <a th:href="@{/trainer/add}" class="btn btn-success">+ Add Trainer</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <!-- Search Bar -->
    <form th:action="@{/trainer/search}" method="get" class="row g-2 mb-3">
        <div class="col">
            <input type="text" name="keyword" class="form-control" placeholder="Search by name or specialization..."
                   th:value="${keyword}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-primary">Search</button>
            <a th:href="@{/trainer/list}" class="btn btn-outline-secondary ms-1">Reset</a>
        </div>
    </form>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Specialization</th>
            <th>Availability</th>
            <th>Pay</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(trainers)}">
            <td colspan="10" class="text-center text-muted">No trainers found.</td>
        </tr>
        <tr th:each="t : ${trainers}">
            <td th:text="${t.trainerId}"></td>
            <td>
                <span th:if="${t.trainerType == 'FULL_TIME'}" class="badge bg-primary">Full-Time</span>
                <span th:if="${t.trainerType == 'PART_TIME'}" class="badge bg-info text-dark">Part-Time</span>
                <span th:if="${t.trainerType == 'GENERAL'}" class="badge bg-secondary">General</span>
            </td>
            <td th:text="${t.name}"></td>
            <td th:text="${t.email}"></td>
            <td th:text="${t.phone}"></td>
            <td th:text="${t.specialization}"></td>
            <td th:text="${t.availability}"></td>
            <td>
                <span th:if="${t.trainerType == 'PART_TIME'}" th:text="${'Rs. ' + t.hourlyRate + '/hr'}"></span>
                <span th:if="${t.trainerType != 'PART_TIME'}" th:text="${'Rs. ' + t.salary + '/mo'}"></span>
            </td>
            <td>
                <span th:if="${t.status == 'ACTIVE'}" class="badge bg-success">ACTIVE</span>
                <span th:if="${t.status == 'INACTIVE'}" class="badge bg-secondary">INACTIVE</span>
            </td>
            <td>
                <a th:href="@{/trainer/view/{id}(id=${t.trainerId})}"
                   class="btn btn-sm btn-outline-info">View</a>
                <a th:href="@{/trainer/edit/{id}(id=${t.trainerId})}"
                   class="btn btn-sm btn-outline-primary">Edit</a>
                <form th:action="@{/trainer/deactivate/{id}(id=${t.trainerId})}" method="post"
                      style="display:inline">
                    <button class="btn btn-sm btn-outline-warning"
                            onclick="return confirm('Deactivate this trainer?')">
                        Deactivate
                    </button>
                </form>
                <form th:action="@{/trainer/delete/{id}(id=${t.trainerId})}" method="post"
                      style="display:inline">
                    <button class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Permanently delete this trainer?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/}" class="btn btn-secondary">← Back</a>
</div>
</body>

</html>
