<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Trainer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:560px">
    <h2 class="mb-4">➕ Add New Trainer</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/trainer/add}" th:object="${trainer}" method="post">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" th:field="*{phone}">
        </div>
        <div class="mb-3">
            <label class="form-label">Specialization</label>
            <select class="form-select" th:field="*{specialization}" required>
                <option value="">-- Select --</option>
                <option value="Yoga">Yoga</option>
                <option value="Cardio">Cardio</option>
                <option value="Weightlifting">Weightlifting</option>
                <option value="Pilates">Pilates</option>
                <option value="Crossfit">Crossfit</option>
                <option value="Zumba">Zumba</option>
                <option value="Nutrition">Nutrition</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Availability</label>
            <select class="form-select" th:field="*{availability}">
                <option value="WEEKDAYS">Weekdays</option>
                <option value="WEEKENDS">Weekends</option>
                <option value="MON-WED-FRI">Mon / Wed / Fri</option>
                <option value="TUE-THU-SAT">Tue / Thu / Sat</option>
                <option value="FULLWEEK">Full Week</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Monthly Salary (Rs.)</label>
            <input type="number" class="form-control" th:field="*{salary}"
                   step="0.01" min="0">
        </div>

        <button type="submit" class="btn btn-success w-100">Add Trainer</button>
        <a th:href="@{/trainer/list}"
           class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
    </form>
</div>
</body>
</html>
