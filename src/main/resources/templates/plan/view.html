<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:550px">
    <h2 class="mb-4">💳 Plan Details</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title" th:text="${plan.planName}"></h4>
            <hr>
            <p><strong>Plan ID:</strong> <span th:text="${plan.planId}"></span></p>
            <p><strong>Description:</strong> <span th:text="${plan.description}"></span></p>
            <p><strong>Price:</strong> Rs. <span th:text="${plan.price}"></span></p>
            <p><strong>Duration:</strong> <span th:text="${plan.durationMonths}"></span> month(s)</p>
            <p><strong>Features:</strong> <span th:text="${plan.features}"></span></p>
        </div>
        <div class="card-footer">
            <a th:href="@{/plan/edit/{id}(id=${plan.planId})}" class="btn btn-primary">Edit</a>
            <a th:href="@{/plan/list}" class="btn btn-outline-secondary ms-2">Back to List</a>
        </div>
    </div>
</div>
</body>
</html>
