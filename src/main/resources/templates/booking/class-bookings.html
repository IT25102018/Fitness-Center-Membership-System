<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Class Bookings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">

  <h2 class="mb-1">🎫 Bookings for:
    <span th:text="${fitnessClass.className}" class="text-primary"></span>
  </h2>
  <p class="text-muted mb-3">
    Trainer: <span th:text="${fitnessClass.trainerName}"></span> |
    Schedule: <span th:text="${fitnessClass.schedule}"></span> |
    Enrolled: <span th:text="${fitnessClass.enrolledCount}"></span>
    / <span th:text="${fitnessClass.maxCapacity}"></span>
  </p>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
      <th>Booking ID</th>
      <th>Username</th>
      <th>Booking Date</th>
      <th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(bookings)}">
      <td colspan="4" class="text-center text-muted">
        No bookings for this class yet.
      </td>
    </tr>
    <tr th:each="b : ${bookings}">
      <td th:text="${b.bookingId}"></td>
      <td th:text="${b.username}"></td>
      <td th:text="${b.bookingDate}"></td>
      <td>
                    <span th:if="${b.bookingStatus == 'CONFIRMED'}"
                          class="badge bg-success">Confirmed</span>
        <span th:if="${b.bookingStatus == 'CANCELLED'}"
              class="badge bg-secondary">Cancelled</span>
        <span th:if="${b.bookingStatus == 'ATTENDED'}"
              class="badge bg-primary">Attended</span>
        <span th:if="${b.bookingStatus == 'NO_SHOW'}"
              class="badge bg-danger">No Show</span>
      </td>
    </tr>
    </tbody>
  </table>

  <a th:href="@{/booking/admin/classes}" class="btn btn-secondary">← Back</a>
</div>
</body>
</html>
