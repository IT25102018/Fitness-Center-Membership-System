<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Class</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:580px">
    <h2 class="mb-4">➕ Add New Class</h2>

    <form th:action="@{/booking/admin/add}"
          th:object="${fitnessClass}" method="post">

        <div class="mb-3">
            <label class="form-label">Class Name</label>
            <input type="text" class="form-control" th:field="*{className}" required>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Trainer ID</label>
                <input type="text" class="form-control" th:field="*{trainerId}">
            </div>
            <div class="col mb-3">
                <label class="form-label">Trainer Name</label>
                <input type="text" class="form-control" th:field="*{trainerName}" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Schedule</label>
            <input type="text" class="form-control" th:field="*{schedule}"
                   placeholder="e.g. MON 08:00, WED 10:00" required>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Duration</label>
                <input type="text" class="form-control" th:field="*{duration}"
                       placeholder="e.g. 60 mins">
            </div>
            <div class="col mb-3">
                <label class="form-label">Max Capacity</label>
                <input type="number" class="form-control" th:field="*{maxCapacity}"
                       min="1" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Class Type</label>
            <select class="form-select" th:field="*{classType}" required>
                <option value="">-- Select --</option>
                <option value="GROUP">Group</option>
                <option value="PERSONAL">Personal</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" th:field="*{status}">
                <option value="ACTIVE">Active</option>
                <option value="CANCELLED">Cancelled</option>
                <option value="COMPLETED">Completed</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success w-100">Add Class</button>
        <a th:href="@{/booking/admin/classes}"
           class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
    </form>
</div>
</body>
</html>
