<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Manage Classes - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>📋 Manage Classes</h2>
        <div>
            <a th:href="@{/booking/admin/bookings}" class="btn btn-outline-primary me-2">All Bookings</a>
            <a th:href="@{/booking/admin/add}" class="btn btn-success">+ Add Class</a>
        </div>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Class Name</th>
            <th>Trainer</th>
            <th>Schedule</th>
            <th>Duration</th>
            <th>Type</th>
            <th>Enrolled / Max</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(classes)}">
            <td colspan="9" class="text-center text-muted">No classes found.</td>
        </tr>
        <tr th:each="c : ${classes}">
            <td th:text="${c.classId}"></td>
            <td th:text="${c.className}"></td>
            <td th:text="${c.trainerName}"></td>
            <td th:text="${c.schedule}"></td>
            <td th:text="${c.duration}"></td>
            <td>
                <span th:if="${c.classType == 'GROUP'}" class="badge bg-info text-dark">Group</span>
                <span th:if="${c.classType == 'PERSONAL'}" class="badge bg-warning text-dark">Personal</span>
            </td>
            <td>
                <span th:text="${c.enrolledCount + ' / ' + c.maxCapacity}"></span>
            </td>
            <td>
                <span th:if="${c.status == 'ACTIVE'}" class="badge bg-success">Active</span>
                <span th:if="${c.status == 'CANCELLED'}" class="badge bg-danger">Cancelled</span>
                <span th:if="${c.status == 'COMPLETED'}" class="badge bg-secondary">Completed</span>
            </td>
            <td>
                <a th:href="@{/booking/admin/class/{id}/bookings(id=${c.classId})}"
                   class="btn btn-sm btn-outline-info">Bookings</a>
                <a th:href="@{/booking/admin/edit/{id}(id=${c.classId})}"
                   class="btn btn-sm btn-outline-primary">Edit</a>
                <form th:action="@{/booking/admin/delete/{id}(id=${c.classId})}" method="post"
                      style="display:inline">
                    <button class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Delete this class?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/}" class="btn btn-secondary">← Back</a>
</div>
</body>

</html>
