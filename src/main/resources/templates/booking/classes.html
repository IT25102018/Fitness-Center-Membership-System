<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Available Classes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>
<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>📅 Available Classes</h2>
    <a th:href="@{/booking/my}" class="btn btn-outline-primary">My Bookings</a>
  </div>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <!-- Search -->
  <form th:action="@{/booking/classes/search}" method="get" class="row g-2 mb-3">
    <div class="col">
      <input type="text" name="keyword" class="form-control"
             placeholder="Search by class name or trainer..."
             th:value="${keyword}">
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-outline-primary">Search</button>
      <a th:href="@{/booking/classes}" class="btn btn-outline-secondary ms-1">Reset</a>
    </div>
  </form>

  <!-- Class Cards -->
  <div class="row row-cols-1 row-cols-md-2 g-3">
    <div th:if="${#lists.isEmpty(classes)}" class="col">
      <p class="text-muted">No active classes available.</p>
    </div>
    <div class="col" th:each="c : ${classes}">
      <div class="card h-100 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong th:text="${c.className}"></strong>
          <span th:if="${c.classType == 'GROUP'}"
                class="badge bg-info text-dark">Group</span>
          <span th:if="${c.classType == 'PERSONAL'}"
                class="badge bg-warning text-dark">Personal</span>
        </div>
        <div class="card-body">
          <p class="mb-1">
            <strong>Trainer:</strong>
            <span th:text="${c.trainerName}"></span>
          </p>
          <p class="mb-1">
            <strong>Schedule:</strong>
            <span th:text="${c.schedule}"></span>
          </p>
          <p class="mb-1">
            <strong>Duration:</strong>
            <span th:text="${c.duration}"></span>
          </p>
          <p class="mb-1">
            <strong>Spots Left:</strong>
            <span th:text="${c.availableSpots}"
                  th:class="${c.availableSpots == 0}
                                        ? 'text-danger fw-bold'
                                        : 'text-success fw-bold'">
                        </span>
            / <span th:text="${c.maxCapacity}"></span>
          </p>
        </div>
        <div class="card-footer">
          <form th:action="@{/booking/book/{id}(id=${c.classId})}"
                method="post">
            <button type="submit" class="btn btn-success w-100"
                    th:disabled="${c.availableSpots == 0}"
                    th:text="${c.availableSpots == 0}
                                          ? 'Class Full'
                                          : 'Book Now'">
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-3">
    <a th:href="@{/}" class="btn btn-secondary">← Back</a>
  </div>
</div>
</body>
</html>
