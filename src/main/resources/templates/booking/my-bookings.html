<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Bookings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>
<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>🎫 My Bookings</h2>
    <a th:href="@{/booking/classes}" class="btn btn-success">+ Book a Class</a>
  </div>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <table class="table table-bordered table-hover align-middle">
    <thead class="table-dark">
    <tr>
      <th>Booking ID</th>
      <th>Class Name</th>
      <th>Booking Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(bookings)}">
      <td colspan="5" class="text-center text-muted">
        No bookings found. Book a class to get started!
      </td>
    </tr>
    <tr th:each="b : ${bookings}">
      <td th:text="${b.bookingId}"></td>
      <td th:text="${b.className}"></td>
      <td th:text="${b.bookingDate}"></td>
      <td>
                    <span th:if="${b.bookingStatus == 'CONFIRMED'}"
                          class="badge bg-success">Confirmed</span>
        <span th:if="${b.bookingStatus == 'CANCELLED'}"
              class="badge bg-secondary">Cancelled</span>
        <span th:if="${b.bookingStatus == 'ATTENDED'}"
              class="badge bg-primary">Attended</span>
        <span th:if="${b.bookingStatus == 'NO_SHOW'}"
              class="badge bg-danger">No Show</span>
      </td>
      <td>
        <form th:if="${b.bookingStatus == 'CONFIRMED'}"
              th:action="@{/booking/cancel/{id}(id=${b.bookingId})}"
              method="post" style="display:inline">
          <button class="btn btn-sm btn-outline-danger"
                  onclick="return confirm('Cancel this booking?')">
            Cancel
          </button>
        </form>
        <span th:if="${b.bookingStatus != 'CONFIRMED'}"
              class="text-muted small">No action</span>
      </td>
    </tr>
    </tbody>
  </table>

  <a th:href="@{/}" class="btn btn-secondary">← Back</a>
</div>
</body>
</html>
