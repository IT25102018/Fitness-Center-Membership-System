<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Profile - Fitness Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width:500px">
  <h2 class="mb-4">👤 My Profile</h2>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

  <form th:action="@{/user/update}" th:object="${user}" method="post">
    <input type="hidden" th:field="*{userId}">
    <input type="hidden" th:field="*{role}">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" th:field="*{username}" readonly>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" th:field="*{email}">
    </div>
    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" class="form-control" th:field="*{phone}">
    </div>
    <div class="mb-3">
      <label class="form-label">Membership Type</label>
      <select class="form-select" th:field="*{membershipType}">
        <option value="BASIC">Basic</option>
        <option value="PREMIUM">Premium</option>
        <option value="VIP">VIP</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">New Password</label>
      <input type="password" class="form-control" th:field="*{password}">
    </div>
    <button type="submit" class="btn btn-primary">Update Profile</button>
    <a th:href="@{/user/logout}" class="btn btn-outline-secondary ms-2">Logout</a>
  </form>
</div>
</body>
</html>
