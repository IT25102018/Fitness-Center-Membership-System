<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>User List - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">
    <h2>👥 All Members</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <table class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Membership</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.userId}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.phone}"></td>
            <td th:text="${u.membershipType}"></td>
            <td th:text="${u.role}"></td>
            <td>
                <a th:href="@{/user/profile/{id}(id=${u.userId})}"
                   class="btn btn-sm btn-outline-primary">Edit</a>
                <form th:action="@{/user/delete/{id}(id=${u.userId})}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Delete this user?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">← Back</a>
</div>
</body>

</html>
