<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Payments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>💰 My Payment History</h2>
        <div>
            <a th:href="@{/payment/my/invoices}"
               class="btn btn-outline-primary me-2">My Invoices</a>
            <a th:href="@{/payment/make}"
               class="btn btn-success">+ New Payment</a>
        </div>
    </div>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Payment ID</th>
            <th>Plan</th>
            <th>Amount (Rs.)</th>
            <th>Method</th>
            <th>Date</th>
            <th>Status</th>
            <th>Remarks</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(payments)}">
            <td colspan="7" class="text-center text-muted">
                No payment records found.
            </td>
        </tr>
        <tr th:each="p : ${payments}">
            <td th:text="${p.paymentId}"></td>
            <td th:text="${p.planName}"></td>
            <td th:text="${p.amount}"></td>
            <td th:text="${p.paymentMethod}"></td>
            <td th:text="${p.paymentDate}"></td>
            <td>
                    <span th:if="${p.paymentStatus == 'PAID'}"
                          class="badge bg-success">Paid</span>
                <span th:if="${p.paymentStatus == 'PENDING'}"
                      class="badge bg-warning text-dark">Pending</span>
                <span th:if="${p.paymentStatus == 'FAILED'}"
                      class="badge bg-danger">Failed</span>
                <span th:if="${p.paymentStatus == 'REFUNDED'}"
                      class="badge bg-secondary">Refunded</span>
            </td>
            <td th:text="${p.remarks}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/}" class="btn btn-secondary">← Back</a>
</div>
</body>
</html>
