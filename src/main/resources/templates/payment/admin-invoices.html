<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Invoices - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>🧾 All Invoices</h2>
        <a th:href="@{/payment/admin/list}"
           class="btn btn-outline-secondary">← Payments</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Invoice ID</th>
            <th>Payment ID</th>
            <th>Username</th>
            <th>Plan</th>
            <th>Subtotal</th>
            <th>Discount</th>
            <th>Tax</th>
            <th>Total (Rs.)</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(invoices)}">
            <td colspan="11" class="text-center text-muted">
                No invoices found.
            </td>
        </tr>
        <tr th:each="inv : ${invoices}">
            <td th:text="${inv.invoiceId}"></td>
            <td th:text="${inv.paymentId}"></td>
            <td th:text="${inv.username}"></td>
            <td th:text="${inv.planName}"></td>
            <td th:text="${inv.subtotal}"></td>
            <td class="text-success" th:text="${inv.discountAmount}"></td>
            <td class="text-muted"   th:text="${inv.taxAmount}"></td>
            <td class="fw-bold"      th:text="${inv.totalAmount}"></td>
            <td th:text="${inv.invoiceDate}"></td>
            <td>
                    <span th:if="${inv.invoiceStatus == 'ISSUED'}"
                          class="badge bg-primary">Issued</span>
                <span th:if="${inv.invoiceStatus == 'PAID'}"
                      class="badge bg-success">Paid</span>
                <span th:if="${inv.invoiceStatus == 'CANCELLED'}"
                      class="badge bg-danger">Cancelled</span>
            </td>
            <td>
                <form th:action="@{/payment/admin/invoice/status/{id}(id=${inv.invoiceId})}"
                      method="post" style="display:inline">
                    <select name="newStatus"
                            class="form-select form-select-sm d-inline w-auto">
                        <option value="ISSUED">Issued</option>
                        <option value="PAID">Paid</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                    <button class="btn btn-sm btn-outline-primary ms-1">
                        Update
                    </button>
                </form>
                <form th:action="@{/payment/admin/invoice/delete/{id}(id=${inv.invoiceId})}"
                      method="post" style="display:inline">
                    <button class="btn btn-sm btn-outline-danger ms-1"
                            onclick="return confirm('Delete this invoice?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
