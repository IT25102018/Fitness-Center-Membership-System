<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>All Payments - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>💰 All Payments</h2>
            <a th:href="@{/payment/admin/invoices}" class="btn btn-outline-primary">All Invoices</a>
        </div>

        <!-- Summary Cards -->
        <div class="row mb-3 g-2">
            <div class="col-md-3">
                <div class="card text-white bg-success text-center py-2">
                    <small>Total Revenue</small>
                    <h5 class="mb-0">Rs. <span th:text="${totalRevenue}"></span></h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-dark bg-light text-center py-2 border">
                    <small>Cash Payments</small>
                    <h5 class="mb-0" th:text="${cashCount}"></h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-dark bg-light text-center py-2 border">
                    <small>Card Payments</small>
                    <h5 class="mb-0" th:text="${cardCount}"></h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-dark bg-light text-center py-2 border">
                    <small>Online Payments</small>
                    <h5 class="mb-0" th:text="${onlineCount}"></h5>
                </div>
            </div>
        </div>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <!-- Status Filter -->
        <form th:action="@{/payment/admin/list}" method="get" class="row g-2 mb-3">
            <div class="col-auto">
                <select name="status" class="form-select">
                    <option value="">All Statuses</option>
                    <option value="PAID" th:selected="${selectedStatus == 'PAID'}">Paid</option>
                    <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">Pending</option>
                    <option value="FAILED" th:selected="${selectedStatus == 'FAILED'}">Failed</option>
                    <option value="REFUNDED" th:selected="${selectedStatus == 'REFUNDED'}">Refunded</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-outline-primary">Filter</button>
                <a th:href="@{/payment/admin/list}" class="btn btn-outline-secondary ms-1">Reset</a>
            </div>
        </form>

        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Payment ID</th>
                    <th>Username</th>
                    <th>Plan</th>
                    <th>Amount (Rs.)</th>
                    <th>Method</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(payments)}">
                    <td colspan="8" class="text-center text-muted">
                        No payments found.
                    </td>
                </tr>
                <tr th:each="p : ${payments}">
                    <td th:text="${p.paymentId}"></td>
                    <td th:text="${p.username}"></td>
                    <td th:text="${p.planName}"></td>
                    <td th:text="${p.amount}"></td>
                    <td th:text="${p.paymentMethod}"></td>
                    <td th:text="${p.paymentDate}"></td>
                    <td>
                        <span th:if="${p.paymentStatus == 'PAID'}" class="badge bg-success">Paid</span>
                        <span th:if="${p.paymentStatus == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                        <span th:if="${p.paymentStatus == 'FAILED'}" class="badge bg-danger">Failed</span>
                        <span th:if="${p.paymentStatus == 'REFUNDED'}" class="badge bg-secondary">Refunded</span>
                    </td>
                    <td>
                        <!-- Quick status update -->
                        <form th:action="@{/payment/admin/status/{id}(id=${p.paymentId})}" method="post"
                            style="display:inline">
                            <select name="newStatus" class="form-select form-select-sm d-inline w-auto">
                                <option value="PAID">Paid</option>
                                <option value="PENDING">Pending</option>
                                <option value="REFUNDED">Refunded</option>
                                <option value="FAILED">Failed</option>
                            </select>
                            <button class="btn btn-sm btn-outline-primary ms-1">
                                Update
                            </button>
                        </form>
                        <form th:action="@{/payment/admin/delete/{id}(id=${p.paymentId})}" method="post"
                            style="display:inline">
                            <button class="btn btn-sm btn-outline-danger ms-1"
                                onclick="return confirm('Delete this payment?')">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/}" class="btn btn-secondary">← Back</a>
    </div>
</body>

</html>
