<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Equipment - Fitness Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>🏋️ Equipment Management</h2>
            <a th:href="@{/equipment/add}" class="btn btn-success">+ Add Equipment</a>
        </div>

        <!-- Summary Cards -->
        <div class="row mb-3">
            <div class="col-md-4">
                <div class="card text-white bg-primary">
                    <div class="card-body py-2">
                        <small>Total Equipment</small>
                        <h5 class="mb-0" th:text="${#lists.size(equipmentList)}"></h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success">
                    <div class="card-body py-2">
                        <small>Total Value (Rs.)</small>
                        <h5 class="mb-0" th:text="${'Rs. ' + totalValue}"></h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-danger">
                    <div class="card-body py-2">
                        <small>Needs Repair</small>
                        <h5 class="mb-0" th:text="${needsRepair}"></h5>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <!-- Search & Filter -->
        <form th:action="@{/equipment/search}" method="get" class="row g-2 mb-3">
            <div class="col-md-4">
                <input type="text" name="keyword" class="form-control" placeholder="Search by name or brand..."
                    th:value="${keyword}">
            </div>
            <div class="col-md-3">
                <select name="category" class="form-select">
                    <option value="">All Categories</option>
                    <option value="CARDIO" th:selected="${selectedCategory == 'CARDIO'}">Cardio</option>
                    <option value="STRENGTH" th:selected="${selectedCategory == 'STRENGTH'}">Strength</option>
                    <option value="FLEXIBILITY" th:selected="${selectedCategory == 'FLEXIBILITY'}">Flexibility</option>
                    <option value="RECOVERY" th:selected="${selectedCategory == 'RECOVERY'}">Recovery</option>
                </select>
            </div>
            <div class="col-md-3">
                <select name="status" class="form-select">
                    <option value="">All Statuses</option>
                    <option value="AVAILABLE" th:selected="${selectedStatus == 'AVAILABLE'}">Available</option>
                    <option value="IN_USE" th:selected="${selectedStatus == 'IN_USE'}">In Use</option>
                    <option value="UNDER_MAINTENANCE" th:selected="${selectedStatus == 'UNDER_MAINTENANCE'}">Under
                        Maintenance</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-outline-primary w-100">Filter</button>
            </div>
        </form>
        <a th:href="@{/equipment/list}" class="btn btn-outline-secondary btn-sm mb-3">Reset Filters</a>

        <!-- Equipment Table -->
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Brand</th>
                    <th>Qty</th>
                    <th>Price (Rs.)</th>
                    <th>Condition</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(equipmentList)}">
                    <td colspan="9" class="text-center text-muted">No equipment found.</td>
                </tr>
                <tr th:each="e : ${equipmentList}">
                    <td th:text="${e.equipmentId}"></td>
                    <td th:text="${e.name}"></td>
                    <td>
                        <span th:text="${e.category}" class="badge" th:classappend="${e.category == 'CARDIO'} ? 'bg-info text-dark'
                                        : (${e.category == 'STRENGTH'} ? 'bg-warning text-dark'
                                        : (${e.category == 'FLEXIBILITY'} ? 'bg-success'
                                        : 'bg-secondary'))">
                        </span>
                    </td>
                    <td th:text="${e.brand}"></td>
                    <td th:text="${e.quantity}"></td>
                    <td th:text="${'Rs. ' + e.purchasePrice}"></td>
                    <td>
                        <span th:text="${e.condition}" th:class="${e.condition == 'EXCELLENT'} ? 'text-success fw-bold'
                                   : (${e.condition == 'GOOD'} ? 'text-primary'
                                   : (${e.condition == 'FAIR'} ? 'text-warning'
                                   : 'text-danger fw-bold'))">
                        </span>
                    </td>
                    <td>
                        <span th:if="${e.status == 'AVAILABLE'}" class="badge bg-success">Available</span>
                        <span th:if="${e.status == 'IN_USE'}" class="badge bg-primary">In Use</span>
                        <span th:if="${e.status == 'UNDER_MAINTENANCE'}" class="badge bg-danger">Maintenance</span>
                    </td>
                    <td>
                        <a th:href="@{/equipment/view/{id}(id=${e.equipmentId})}"
                            class="btn btn-sm btn-outline-info">View</a>
                        <a th:href="@{/equipment/edit/{id}(id=${e.equipmentId})}"
                            class="btn btn-sm btn-outline-primary">Edit</a>
                        <form th:action="@{/equipment/delete/{id}(id=${e.equipmentId})}" method="post"
                            style="display:inline">
                            <button class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Delete this equipment?')">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/}" class="btn btn-secondary">← Back</a>
    </div>
</body>

</html>
