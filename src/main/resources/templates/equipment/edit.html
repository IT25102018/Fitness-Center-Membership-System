<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Equipment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:580px">
    <h2 class="mb-4">✏️ Edit Equipment</h2>

    <form th:action="@{/equipment/edit}" th:object="${equipment}" method="post">
        <input type="hidden" th:field="*{equipmentId}">

        <div class="mb-3">
            <label class="form-label">Equipment Name</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" th:field="*{category}" required>
                <option value="CARDIO">Cardio</option>
                <option value="STRENGTH">Strength</option>
                <option value="FLEXIBILITY">Flexibility</option>
                <option value="RECOVERY">Recovery</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Brand</label>
            <input type="text" class="form-control" th:field="*{brand}">
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-control" th:field="*{quantity}"
                       min="1" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Purchase Price (Rs.)</label>
                <input type="number" class="form-control" th:field="*{purchasePrice}"
                       step="0.01" min="0" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Purchase Date</label>
            <input type="date" class="form-control" th:field="*{purchaseDate}">
        </div>
        <div class="mb-3">
            <label class="form-label">Condition</label>
            <select class="form-select" th:field="*{condition}">
                <option value="EXCELLENT">Excellent</option>
                <option value="GOOD">Good</option>
                <option value="FAIR">Fair</option>
                <option value="NEEDS_REPAIR">Needs Repair</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" th:field="*{status}">
                <option value="AVAILABLE">Available</option>
                <option value="IN_USE">In Use</option>
                <option value="UNDER_MAINTENANCE">Under Maintenance</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">Update Equipment</button>
        <a th:href="@{/equipment/list}"
           class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
    </form>
</div>
</body>
</html>
